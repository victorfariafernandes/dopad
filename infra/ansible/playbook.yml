---
- name: Configure zeropad VM
  hosts: zeropad
  become: true
  vars:
    domain: "zeropad.dev"
    github_owner: "victorfariafernandes"
    block_device: /dev/sdb
    data_mount: /data
    oci_namespace: "{{ lookup('env', 'OCI_NAMESPACE') }}"

  roles:
    - volume
    - docker
    - backend
    - frontend
    - caddy
