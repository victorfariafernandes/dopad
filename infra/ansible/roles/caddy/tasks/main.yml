---
- name: Add Caddy COPR repo
  command: dnf copr enable -y @caddy/caddy
  args:
    creates: /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:group_caddy:caddy.repo

- name: Install Caddy
  dnf:
    name: caddy
    state: present

- name: Open HTTPS in firewalld
  firewalld:
    service: https
    permanent: true
    state: enabled
    immediate: true

- name: Create cert directory
  file:
    path: /etc/caddy/certs
    state: directory
    mode: "0700"
    owner: caddy
    group: caddy

- name: Deploy origin certificate
  copy:
    src: "{{ playbook_dir }}/files/origin.pem"
    dest: /etc/caddy/certs/origin.pem
    mode: "0644"
    owner: caddy
    group: caddy
  notify: Reload Caddy

- name: Deploy origin private key
  copy:
    src: "{{ playbook_dir }}/files/origin.key"
    dest: /etc/caddy/certs/origin.key
    mode: "0600"
    owner: caddy
    group: caddy
  notify: Reload Caddy

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
  notify: Reload Caddy

- name: Enable and start Caddy
  systemd:
    name: caddy
    enabled: true
    state: started
